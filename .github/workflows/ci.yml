
name : smart-audit-ci

on:
  push:
    branches : [main]
  pull_request:
    branches : [main]

jobs:
  test :
    runs-on : ubuntu-latest

    steps:
      - name : checkout code
        uses : actions/checkout@v3

      - name : set up python
        uses : actions/setup-python@v4
        with:
          python-version : '3.10'
      
      - name : install dependencies
        run :  pip install -r Backend/requirements.txt

      - name : run tests
        run :  pytest Backend/tests

      - name : security scan
        run : |
          pip install bandit
          bandit -r  --exclude Backend/venv